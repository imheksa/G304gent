name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Check Privy config presence
        run: |
          if [ -n "$APP_ID" ]; then echo "NEXT_PUBLIC_PRIVY_APP_ID is set (length ${#APP_ID})"; else echo "::warning::NEXT_PUBLIC_PRIVY_APP_ID is EMPTY — login/payments will be disabled"; fi
          if [ -n "$WALLET" ]; then echo "NEXT_PUBLIC_RECIPIENT_WALLET is set (length ${#WALLET})"; else echo "::warning::NEXT_PUBLIC_RECIPIENT_WALLET is EMPTY — payments will be disabled"; fi
        env:
          APP_ID: ${{ vars.NEXT_PUBLIC_PRIVY_APP_ID || secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
          WALLET: ${{ vars.NEXT_PUBLIC_RECIPIENT_WALLET || secrets.NEXT_PUBLIC_RECIPIENT_WALLET }}
      - run: npm run build
        env:
          # Public, client-side identifiers. Set these as repository Variables
          # (Settings → Secrets and variables → Actions → Variables).
          # Read from repository Variables, falling back to Secrets so it works
          # regardless of which one was configured (these are public values).
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ vars.NEXT_PUBLIC_PRIVY_APP_ID || secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
          NEXT_PUBLIC_RECIPIENT_WALLET: ${{ vars.NEXT_PUBLIC_RECIPIENT_WALLET || secrets.NEXT_PUBLIC_RECIPIENT_WALLET }}
          NEXT_PUBLIC_SOLANA_RPC_URL: ${{ vars.NEXT_PUBLIC_SOLANA_RPC_URL || secrets.NEXT_PUBLIC_SOLANA_RPC_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
